name: Test & Lint

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: uv kur
        run: pip install uv
      - name: Bağımlılıklar
        run: uv sync --all-extras
      - name: Lint
        run: |
          uv run ruff check src tests
          uv run mypy src/cargobot
      - name: Birim testler
        run: uv run pytest tests/unit -v
      - name: Entegrasyon testleri
        run: uv run pytest tests/integration -v
      - name: UI bilgi bütünlüğü (şartname §3.1.1.10)
        run: uv run pytest tests/integration/test_ui_information_completeness.py -v
