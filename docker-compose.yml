# CargoBot lokal simülasyon.
#
# Üç servis:
#   plc-sim   Modbus TCP simulator (port 5020)
#   ros2      Gazebo + slam_toolbox + Nav2 + cargobot URDF spawn
#   cargobot  Python çekirdeği (--profile=sim)
#
# Kullanım:
#   docker compose up
#   docker compose up plc-sim ros2          # GUI'yi host'tan koşturmak istersen
#   docker compose down
#
# X11 paylaşımı host'ta:
#   xhost +local:docker

services:
  plc-sim:
    image: oitc/modbus-server:latest
    container_name: cargobot-plc-sim
    ports:
      - "5020:5020"
    volumes:
      - ./sim/configs/modbus_server.json:/server_config/server_config.json:ro

  ros2:
    build:
      context: .
      dockerfile: sim/Dockerfile.sim
    image: cargobot/ros2-sim:humble
    container_name: cargobot-ros2
    network_mode: host
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=42
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ./sim:/workspace/sim:ro
      - ./hardware:/workspace/hardware:ro

  cargobot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cargobot-core
    network_mode: host
    environment:
      - CARGOBOT_PROFILE=sim
      - PLC_HOST=localhost
      - PLC_PORT=5020
      - ROS_DOMAIN_ID=42
    depends_on:
      - plc-sim
      - ros2
    command: ["python", "src/main.py", "--headless"]
